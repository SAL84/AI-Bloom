<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Fundamentals — Diagrams 0a & 0b</title>
<style>
/* ── CSS Variables: light mode ─────────────────────────────── */
:root {
  --color-text-primary:         #1a1a18;
  --color-text-secondary:       #3d3d3a;
  --color-background-primary:   #ffffff;
  --color-background-secondary: #f5f4f0;
  --b:   #1a1a18;
  --t:   #3d3d3a;
  --bg2: #f5f4f0;

  /* Colour palette */
  --c-teal-bg:   #ccfbf1; --c-teal-bd:   #0d9488;  --c-teal-tx:   #0f766e;
  --c-purple-bg: #ede9fe; --c-purple-bd: #7c3aed;  --c-purple-tx: #6d28d9;
  --c-coral-bg:  #fee2e2; --c-coral-bd:  #e05252;  --c-coral-tx:  #b91c1c;
  --c-amber-bg:  #fef3c7; --c-amber-bd:  #d97706;  --c-amber-tx:  #92400e;
  --c-gray-bg:   #f1f0ec; --c-gray-bd:   #9ca3af;  --c-gray-tx:   #4b5563;
  --c-blue-bg:   #dbeafe; --c-blue-bd:   #2563eb;  --c-blue-tx:   #1d4ed8;
  --c-green-bg:  #d1fae5; --c-green-bd:  #10b981;  --c-green-tx:  #065f46;
  --c-red-bg:    #fee2e2; --c-red-bd:    #ef4444;  --c-red-tx:    #991b1b;
  --c-pink-bg:   #fce7f3; --c-pink-bd:   #ec4899;  --c-pink-tx:   #9d174d;
}

/* ── Dark mode ─────────────────────────────────────────────── */
@media (prefers-color-scheme: dark) {
  :root {
    --color-text-primary:         #f0efe9;
    --color-text-secondary:       #c2c1b8;
    --color-background-primary:   #1a1a18;
    --color-background-secondary: #252522;
    --b:   #f0efe9;
    --t:   #c2c1b8;
    --bg2: #252522;

    --c-teal-bg:   #0d3330; --c-teal-bd:   #14b8a6; --c-teal-tx:   #5eead4;
    --c-purple-bg: #2e1065; --c-purple-bd: #a78bfa; --c-purple-tx: #c4b5fd;
    --c-coral-bg:  #450a0a; --c-coral-bd:  #f87171; --c-coral-tx:  #fca5a5;
    --c-amber-bg:  #451a03; --c-amber-bd:  #fbbf24; --c-amber-tx:  #fde68a;
    --c-gray-bg:   #27272a; --c-gray-bd:   #6b7280; --c-gray-tx:   #d1d5db;
    --c-blue-bg:   #1e3a5f; --c-blue-bd:   #60a5fa; --c-blue-tx:   #93c5fd;
    --c-green-bg:  #052e16; --c-green-bd:  #34d399; --c-green-tx:  #6ee7b7;
    --c-red-bg:    #450a0a; --c-red-bd:    #f87171; --c-red-tx:    #fca5a5;
    --c-pink-bg:   #500724; --c-pink-bd:   #f472b6; --c-pink-tx:   #fbcfe8;
  }
}

/* ── Colour classes (applied to <g> or <rect> parents) ──────── */
.c-teal   { --cbg: var(--c-teal-bg);   --cbd: var(--c-teal-bd);   --ctx: var(--c-teal-tx);   }
.c-purple { --cbg: var(--c-purple-bg); --cbd: var(--c-purple-bd); --ctx: var(--c-purple-tx); }
.c-coral  { --cbg: var(--c-coral-bg);  --cbd: var(--c-coral-bd);  --ctx: var(--c-coral-tx);  }
.c-amber  { --cbg: var(--c-amber-bg);  --cbd: var(--c-amber-bd);  --ctx: var(--c-amber-tx);  }
.c-gray   { --cbg: var(--c-gray-bg);   --cbd: var(--c-gray-bd);   --ctx: var(--c-gray-tx);   }
.c-blue   { --cbg: var(--c-blue-bg);   --cbd: var(--c-blue-bd);   --ctx: var(--c-blue-tx);   }
.c-green  { --cbg: var(--c-green-bg);  --cbd: var(--c-green-bd);  --ctx: var(--c-green-tx);  }
.c-red    { --cbg: var(--c-red-bg);    --cbd: var(--c-red-bd);    --ctx: var(--c-red-tx);    }
.c-pink   { --cbg: var(--c-pink-bg);   --cbd: var(--c-pink-bd);   --ctx: var(--c-pink-tx);   }

/* ── SVG utility classes ────────────────────────────────────── */
.t  { fill: var(--color-text-primary);   font-family: system-ui, sans-serif; }
.ts { fill: var(--color-text-secondary); font-size: 11px; font-family: system-ui, sans-serif; }
.th { fill: var(--color-text-primary);   font-size: 14px; font-weight: 600; font-family: system-ui, sans-serif; }
.arr { stroke: var(--color-text-secondary); fill: none; stroke-width: 1.5; }

/* ── Clickable nodes ────────────────────────────────────────── */
[data-prompt] {
  cursor: pointer;
  transition: filter 0.15s ease;
}
[data-prompt]:hover {
  filter: brightness(0.92) saturate(1.1);
}

/* ── Page layout ────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  font-family: system-ui, -apple-system, sans-serif;
  padding: 1.5rem 1rem;
}

h1 {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--color-text-secondary);
  margin-bottom: 0.25rem;
}

.diagram-section {
  margin-bottom: 3rem;
}

.diagram-label {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-text-secondary);
  margin-bottom: 0.5rem;
}

.diagram-wrap {
  background: var(--color-background-secondary);
  border: 1px solid rgba(128,128,128,0.18);
  border-radius: 12px;
  padding: 1rem;
  overflow-x: auto;
}

.diagram-wrap svg {
  width: 100%;
  height: auto;
  display: block;
}

.diagram-hint {
  font-size: 0.7rem;
  color: var(--color-text-secondary);
  text-align: center;
  margin-top: 0.5rem;
  opacity: 0.7;
}

/* ── Explanation panel (slide-in from right) ────────────────── */
#panel-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.25);
  z-index: 40;
}

#panel {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: min(420px, 92vw);
  background: var(--color-background-primary);
  border-left: 1px solid rgba(128,128,128,0.2);
  box-shadow: -4px 0 24px rgba(0,0,0,0.12);
  z-index: 50;
  padding: 1.5rem;
  transform: translateX(100%);
  transition: transform 0.24s cubic-bezier(.4,0,.2,1);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

#panel.open {
  transform: translateX(0);
}

#panel-backdrop.open {
  display: block;
}

#panel-close {
  align-self: flex-end;
  background: none;
  border: 1px solid rgba(128,128,128,0.3);
  border-radius: 6px;
  padding: 0.3rem 0.7rem;
  font-size: 0.8rem;
  cursor: pointer;
  color: var(--color-text-secondary);
}

#panel-close:hover {
  background: var(--color-background-secondary);
}

#panel-text {
  font-size: 0.95rem;
  line-height: 1.7;
  color: var(--color-text-primary);
}

/* Mobile: panel becomes bottom sheet */
@media (max-width: 600px) {
  #panel {
    top: auto;
    right: 0;
    left: 0;
    bottom: 0;
    width: 100%;
    max-height: 55vh;
    border-left: none;
    border-top: 1px solid rgba(128,128,128,0.2);
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
    transform: translateY(100%);
  }
  #panel.open {
    transform: translateY(0);
  }
}
</style>
</head>

<!-- ── Explanation panel ──────────────────────────────────── -->
<div id="panel-backdrop"></div>
<div id="panel" role="dialog" aria-modal="true" aria-label="Node explanation">
  <button id="panel-close" onclick="closePanel()">✕ Close</button>
  <p id="panel-text"></p>
</div>

<script>
  function openPanel(text) {
    document.getElementById('panel-text').textContent = text;
    document.getElementById('panel').classList.add('open');
    document.getElementById('panel-backdrop').classList.add('open');
  }

  function closePanel() {
    document.getElementById('panel').classList.remove('open');
    document.getElementById('panel-backdrop').classList.remove('open');
  }

  // Event delegation — catches all [data-prompt] clicks in both SVGs
  document.addEventListener('click', function(e) {
    const node = e.target.closest('[data-prompt]');
    if (node) openPanel(node.getAttribute('data-prompt'));
  });

  // Close on backdrop click
  document.getElementById('panel-backdrop').addEventListener('click', closePanel);

  // Close on Escape
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closePanel();
  });
</script>
